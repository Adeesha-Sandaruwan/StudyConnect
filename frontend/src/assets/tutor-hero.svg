<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" fill="none">
  <defs>
    <!-- Glass morphism gradients -->
    <linearGradient id="darkBg" x1="0" y1="0" x2="860" y2="620">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>
    
    <linearGradient id="glassGrad" x1="0" y1="0" x2="100" y2="200">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.02" />
    </linearGradient>
    
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Dark slate background -->
  <rect width="860" height="620" fill="url(#darkBg)" rx="72" />
  
  <!-- Subtle accent lights -->
  <circle cx="100" cy="150" r="80" fill="#6366F1" opacity="0.08" />
  <circle cx="750" cy="450" r="100" fill="#8B5CF6" opacity="0.06" />
  <circle cx="600" cy="100" r="60" fill="#3B82F6" opacity="0.05" />
  
  <!-- Large glassy card background -->
  <rect x="80" y="120" width="700" height="420" rx="40" fill="#FFFFFF" opacity="0.05" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.15" filter="url(#blur)" />
  
  <!-- Inner glass shine effect -->
  <rect x="100" y="140" width="660" height="30" rx="20" fill="url(#glassGrad)" />
  
  <!-- Tutor figure (simplified, elegant) -->
  <g id="tutor">
    <!-- Head -->
    <circle cx="240" cy="200" r="32" fill="#E0E7FF" opacity="0.9" />
    <circle cx="240" cy="200" r="30" fill="#C7D2FE" opacity="0.7" />
    
    <!-- Body outline -->
    <path d="M240 240 Q220 280 220 340 L260 340 Q260 280 240 240" fill="#4F46E5" opacity="0.8" />
    <path d="M240 240 Q260 280 260 340" stroke="#6366F1" stroke-width="2" opacity="0.6" fill="none" />
    
    <!-- Arms -->
    <line x1="220" y1="260" x2="140" y2="260" stroke="#818CF8" stroke-width="12" stroke-linecap="round" opacity="0.85" />
    <line x1="260" y1="260" x2="340" y2="260" stroke="#818CF8" stroke-width="12" stroke-linecap="round" opacity="0.85" />
    
    <!-- Hand points -->
    <circle cx="140" cy="260" r="8" fill="#E0E7FF" opacity="0.8" />
    <circle cx="340" cy="260" r="8" fill="#E0E7FF" opacity="0.8" />
  </g>
  
  <!-- Floating elements around tutor (knowledge particles) -->
  <g id="floatingElements" opacity="0.6">
    <!-- Small glowy squares representing learning -->
    <rect x="140" y="180" width="16" height="16" rx="3" fill="#60A5FA" opacity="0.7" />
    <rect x="340" y="200" width="16" height="16" rx="3" fill="#8B5CF6" opacity="0.7" />
    <rect x="160" y="320" width="16" height="16" rx="3" fill="#3B82F6" opacity="0.7" />
    <rect x="320" y="330" width="16" height="16" rx="3" fill="#60A5FA" opacity="0.7" />
    
    <!-- Connecting lines -->
    <line x1="250" y1="220" x2="150" y2="185" stroke="#6366F1" stroke-width="1" opacity="0.4" stroke-dasharray="3,3" />
    <line x1="250" y1="220" x2="350" y2="210" stroke="#6366F1" stroke-width="1" opacity="0.4" stroke-dasharray="3,3" />
    <line x1="240" y1="340" x2="170" y2="330" stroke="#6366F1" stroke-width="1" opacity="0.4" stroke-dasharray="3,3" />
    <line x1="240" y1="340" x2="330" y2="338" stroke="#6366F1" stroke-width="1" opacity="0.4" stroke-dasharray="3,3" />
  </g>
  
  <!-- Data visualization elements -->
  <g id="dataViz" opacity="0.5">
    <!-- Bar chart representation -->
    <rect x="420" y="300" width="12" height="40" rx="2" fill="#3B82F6" opacity="0.8" />
    <rect x="440" y="280" width="12" height="60" rx="2" fill="#60A5FA" opacity="0.8" />
    <rect x="460" y="260" width="12" height="80" rx="2" fill="#93C5FD" opacity="0.8" />
    <rect x="480" y="290" width="12" height="50" rx="2" fill="#60A5FA" opacity="0.8" />
    
    <!-- Line chart -->
    <polyline points="550,320 570,290 590,310 610,270 630,300" stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round" />
    <circle cx="550" cy="320" r="3" fill="#8B5CF6" opacity="0.8" />
    <circle cx="570" cy="290" r="3" fill="#8B5CF6" opacity="0.8" />
    <circle cx="590" cy="310" r="3" fill="#8B5CF6" opacity="0.8" />
    <circle cx="610" cy="270" r="3" fill="#8B5CF6" opacity="0.8" />
    <circle cx="630" cy="300" r="3" fill="#8B5CF6" opacity="0.8" />
  </g>
  
  <!-- Glassy panels (for dashboard hints) -->
  <g id="glassPanels">
    <!-- Left panel -->
    <rect x="100" y="390" width="140" height="120" rx="16" fill="#FFFFFF" opacity="0.04" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" />
    <line x1="110" y1="410" x2="230" y2="410" stroke="#6366F1" stroke-width="1" opacity="0.3" />
    <line x1="110" y1="430" x2="200" y2="430" stroke="#6366F1" stroke-width="0.5" opacity="0.2" />
    <line x1="110" y1="445" x2="220" y2="445" stroke="#6366F1" stroke-width="0.5" opacity="0.2" />
    <circle cx="240" cy="410" r="4" fill="#10B981" opacity="0.8" />
    
    <!-- Right panel -->
    <rect x="620" y="390" width="140" height="120" rx="16" fill="#FFFFFF" opacity="0.04" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.12" />
    <line x1="630" y1="410" x2="750" y2="410" stroke="#6366F1" stroke-width="1" opacity="0.3" />
    <line x1="630" y1="430" x2="720" y2="430" stroke="#6366F1" stroke-width="0.5" opacity="0.2" />
    <line x1="630" y1="445" x2="740" y2="445" stroke="#6366F1" stroke-width="0.5" opacity="0.2" />
    <circle cx="760" cy="410" r="4" fill="#10B981" opacity="0.8" />
  </g>
  
  <!-- Center highlight (glass shine) -->
  <ellipse cx="430" cy="180" rx="200" ry="80" fill="#FFFFFF" opacity="0.03" />
  
  <!-- Bottom gradient fade -->
  <defs>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="100">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08" />
    </linearGradient>
  </defs>
  <rect x="80" y="500" width="700" height="40" rx="20" fill="url(#bottomFade)" />
</svg>
